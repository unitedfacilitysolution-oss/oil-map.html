name: UFS Draught Tracker

on:
  schedule:
    - cron: '0 6 * * *'  # Every 24 hours at 6am UTC
  workflow_dispatch:       # Manual trigger button

jobs:
  collect-draught:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install ws node-fetch@2

      - name: Run draught collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          AISSTREAM_KEY: ${{ secrets.AISSTREAM_KEY }}
        run: node draught-collector.js
